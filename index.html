      border: 2px solid #ef4444 !important;
      background-color: #fef2f2 !important;
      animation: shake 0.5s both;
    }

    @keyframes shake {

      10%,
      90% {
        transform: translate3d(-1px, 0, 0);
      }

      20%,
      80% {
        transform: translate3d(2px, 0, 0);
      }

      30%,
      50%,
      70% {
        transform: translate3d(-4px, 0, 0);
      }

      40%,
      60% {
        transform: translate3d(4px, 0, 0);
      }
    }

    @keyframes slideUpFade {
      0% {
        transform: translate(-50%, 30px) scale(0.95);
        opacity: 0;
      }

      100% {
        transform: translate(-50%, 0) scale(1);
        opacity: 1;
      }
    }

    .toast-enter {
      animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes swipeLeft {
      0% {
        opacity: 0;
        transform: translateX(30px) scale(0.98);
      }

      100% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    .animate-swipe-left {
      animation: swipeLeft 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-slide-down {
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes gentlePulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 4px 15px rgba(79, 70, 229, 0.2);
      }

      50% {
        transform: scale(1.02);
        box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4);
      }
    }

    .animate-gentle-pulse {
      animation: gentlePulse 2.5s infinite ease-in-out;
    }

    .pb-safe {
      padding-bottom: calc(env(safe-area-inset-bottom) + 16px);
    }

    .suggest-chip {
      background-color: #eef2ff;
      color: #4f46e5;
      border: 1px solid #c7d2fe;
      font-size: 13.5px;

  </style>
</head>

        limit: limit3m, limitMsg: "3개월 이내 내역을 적어주세요.",
        desc: [
          "<strong class='text-blue-600'>질병의심소견이란?</strong> 의사가 진단서, 소견서, 진료의뢰서를 교부한 경우",
          "<strong class='text-blue-600'>투약이란?</strong> 약을 처방받은 행위 (안 먹었어도 고지)"

    let diseases = [];
    let currentTabId = null;
    let nextDiseaseId = 1;

    const STORAGE_KEY = 'insurance_wizard_v19_final_share';

    function saveData() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ step, view, answers, diseases, currentTabId, nextDiseaseId })); }
      catch (e) { }
    }

    function loadData() {
      try {
        const s = localStorage.getItem(STORAGE_KEY);
        if (s) {
          const p = JSON.parse(s);
          step = p.step || 0; view = p.view || 'intro'; answers = p.answers || {}; diseases = p.diseases || [];
          currentTabId = p.currentTabId; nextDiseaseId = p.nextDiseaseId || 1;
        }
      } catch (e) { }
    }

    function resetAll() {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) { }
      step = 0; view = 'intro'; answers = {}; diseases = []; currentTabId = null; nextDiseaseId = 1;
      render(true);
      showToast("처음부터 다시 시작합니다.");
    }

    window.addEventListener('popstate', function (event) {
      if (step > 0 || view === 'd' || view === 'q') {
        try { history.pushState(null, null, location.href); } catch (e) { }
        goBack();
      }
    });

    function render(animate = true) {
      saveData();
      const container = document.getElementById('app-container');
      const headerTitle = document.getElementById('header-title');
      const progressBar = document.getElementById('progress-bar');
      const backBtn = document.getElementById('back-btn');

      container.classList.remove('animate-swipe-left');
      if (animate) void container.offsetWidth;
      container.classList.add('animate-swipe-left');

      if (view === 'intro') {
        headerTitle.innerText = `계약 전 알릴 의무 사항`;
        progressBar.style.width = `0%`;
        backBtn.style.visibility = 'hidden';
        container.innerHTML = renderIntroView();
        updateActionBtn('네, 동의하고 시작할게요', false);
      }
      else if (step < 6) {
        const progress = Math.round(((step) / 6) * 100);
        progressBar.style.width = `${progress}%`;
        backBtn.style.visibility = 'visible';

        if (view === 'q') {
          headerTitle.innerText = `질문 ${step + 1} / 6`;
          container.innerHTML = renderQuestionView(step);
          updateActionBtn('질문을 선택해주세요', true);
        } else if (view === 'd') {
          headerTitle.innerText = `상세 입력 (Q${step + 1})`;
          ensureDiseaseExistsForStep(step);
          container.innerHTML = renderDetailView(step);
          updateActionBtn(step === 5 ? '결과 확인하기' : '다음 질문으로', false);
        }
      } else {
        progressBar.style.width = `100%`;
        headerTitle.innerText = `작성 완료`;
        container.innerHTML = renderSummaryView();
        // 🌟 완료 화면에서는 통합된 단일 공유 버튼 출력
        updateActionBtn('내용 공유하기', false, true);
      }
    }

    function renderIntroView() {
      return `
        <div class="bg-white p-8 rounded-[2rem] card-shadow border border-white/50 flex flex-col items-center text-center mt-2 relative overflow-hidden">
          <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-full blur-3xl -mr-10 -mt-10"></div>
          <div class="absolute bottom-0 left-0 w-32 h-32 bg-purple-50 rounded-full blur-3xl -ml-10 -mb-10"></div>
          <div class="relative z-10 flex flex-col items-center">
            <div class="w-20 h-20 bg-gradient-to-br from-indigo-100 to-purple-100 text-indigo-600 rounded-2xl flex items-center justify-center text-[36px] mb-6 shadow-sm border border-white">📋</div>
            <h2 class="text-[24px] font-extrabold text-slate-800 mb-4 leading-[1.3] tracking-tight">질문에 <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">해당하는 병력</span>만<br>작성해주세요!</h2>
            <p class="text-[15.5px] text-slate-500 mb-8 leading-relaxed font-medium"><strong class="text-indigo-600 font-bold bg-indigo-50 px-1 rounded">묻지 않은 내용까지</strong> 적으실 필요 없습니다.</p>

            <div class="bg-slate-50/80 backdrop-blur-sm rounded-[1.5rem] p-6 text-left w-full border border-slate-100 space-y-4 shadow-inner">
              <div class="flex items-start gap-3">
                <div class="bg-indigo-100 text-indigo-600 rounded-full p-1 mt-0.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                <p class="text-[14.5px] text-slate-600 leading-relaxed font-medium"><strong class="text-slate-800 font-extrabold">질문에 '예'라고 답한 경우만</strong> 상세 내용을 적어주세요.</p>
              </div>
              <div class="flex items-start gap-3">
                <div class="bg-indigo-100 text-indigo-600 rounded-full p-1 mt-0.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                <p class="text-[14.5px] text-slate-600 leading-relaxed font-medium"><strong class="text-slate-800 font-extrabold">기간(3개월, 1년, 5년)</strong>에 포함되는지 꼭 확인해주세요.</p>
              </div>

            </div>
          </div>
        </div>
      `;
    }

    function renderIllnessGrid(selectedArr, isInteractive) {
      const mapStr = { "암": "암", "백혈병": "백혈병", "고혈압": "고혈압", "협심증": "협심증", "심근경색": "심근경색", "심장판막증": "심장판막증", "간경화증": "간경화증", "뇌졸중증": "뇌졸중증<span class='block text-[10px] opacity-70 mt-0.5'>(뇌출혈, 뇌경색)</span>", "당뇨병": "당뇨병", "에이즈": "에이즈 및 HIV 보균", "직장/항문질환": "직장 및 항문관련 질환" };

      let html = '<div class="grid grid-cols-3 gap-1.5 w-full">';
      criticalIllnessesList.forEach((ill, idx) => {
        const isSelected = selectedArr.includes(ill);
        const isSpecialBox = ill === '직장/항문질환';

        let border = isSelected ? 'border-indigo-600 bg-indigo-50/50 ring-1 ring-indigo-600 shadow-sm' : 'border-slate-200 bg-white shadow-sm hover:bg-slate-50';
        let txt = isSelected ? 'text-indigo-800' : 'text-slate-700';

        if (isSpecialBox && !isSelected) {
          border = 'border-indigo-500 bg-white shadow-sm hover:bg-indigo-50/50';
          txt = 'text-indigo-800';
        }

        const inner = `<div class="flex items-center justify-center px-1.5 py-3 rounded-[12px] border ${border} h-full w-full transition-all"><span class="text-[12px] font-extrabold break-keep leading-[1.3] text-center w-full ${txt}">${mapStr[ill]}</span></div>`;

        if (isInteractive) {
          html += `<button type="button" onclick="toggleCritical('${ill}')" class="text-left transition-transform active:scale-[0.98] w-full h-full">${inner}</button>`;
        } else {
          html += `<div class="pointer-events-none w-full h-full">${inner}</div>`;
        }

        // Close 3-col grid and start 2-col grid for the last two items
        if (idx === 8) {
          html += '</div><div class="grid grid-cols-2 gap-1.5 w-full mt-1.5">';
        }
      });
      html += '</div>';
      html += '<p class="mt-3 text-right w-full text-[12px] font-bold text-slate-500 tracking-tight">직장 및 항문관련 질환은 <span class="text-indigo-600 border-b border-indigo-200">실손의료보험 가입 시에만</span> 작성합니다.</p>';
      return html;
    }

    function renderQuestionView(idx) {
      const q = questions[idx];
      const yClass = answers[idx] === 'yes' ? 'bg-indigo-50 text-indigo-700 border-2 border-indigo-500 shadow-md ring-4 ring-indigo-50' : 'bg-white text-slate-600 border-2 border-slate-100 hover:border-slate-200';
      const nClass = answers[idx] === 'no' ? 'bg-slate-800 text-white border-2 border-slate-800 shadow-xl shadow-slate-800/20' : 'bg-white text-slate-600 border-2 border-slate-100 hover:border-slate-200';

      return `
        <div class="bg-white p-7 rounded-[2rem] card-shadow border border-white/50">
          <div class="flex flex-col gap-3 mb-6 items-start">
            <span class="bg-slate-800 text-white font-extrabold px-3.5 py-1.5 rounded-xl text-[14px] tracking-tight shadow-sm">질문 ${idx + 1}</span>
            <span class="bg-gradient-to-r from-indigo-50 to-blue-50 text-indigo-700 font-extrabold px-4 py-2.5 rounded-2xl text-[17px] border border-indigo-100/50 w-full shadow-sm flex items-center justify-between">
              ${q.periodLabel} 
              <span class="bg-white text-indigo-500 font-bold px-2 py-0.5 rounded-lg text-[13px] shadow-sm tracking-tight border border-indigo-50">${q.dateBadge}</span>
            </span>
          </div>
          
          <p class="font-extrabold text-slate-800 text-[20px] leading-[1.4] tracking-tight mb-7 px-1 break-keep">${q.text}</p>
          
          ${q.desc ? `
            <div class="bg-indigo-50/50 rounded-2xl p-5 mb-7 border border-indigo-100/50 space-y-3 shadow-inner">
              ${q.desc.map(d => `
                <div class="flex items-start gap-2.5">
                  <div class="bg-white text-indigo-500 rounded-full p-0.5 mt-0.5 shadow-sm"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                  <p class="text-[14px] text-slate-600 leading-relaxed font-medium break-keep">${d}</p>
                </div>
              `).join('')}
            </div>
          ` : ''}

          ${q.hasList ? `
            <div class="mb-8 mt-2">
              <p class="text-[15px] font-extrabold text-slate-800 mb-4 flex items-center gap-2"><span class="bg-indigo-50 text-indigo-600 p-1 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></span> 11대 질환을 꼭 확인해주세요</p>
              ${renderIllnessGrid([], false)}
            </div>
          ` : ''}

          <div class="flex flex-row gap-3 ${!q.desc && !q.hasList ? 'mt-10' : ''}">
            <button onclick="handleAnswer('yes')" class="flex-1 h-[72px] px-2 rounded-2xl font-extrabold transition-all duration-300 ${yClass} flex flex-col items-center justify-center gap-1 break-keep shadow-sm">
              <span class="text-[20px] leading-none">🙌</span>
              <span class="text-[14.5px] leading-tight">네, 있습니다</span>
            </button>
            <button onclick="handleAnswer('no')" class="flex-1 h-[72px] px-2 rounded-2xl font-extrabold transition-all duration-300 ${nClass} flex flex-col items-center justify-center gap-1 break-keep shadow-sm">
              <span class="text-[20px] leading-none opacity-80">🙅</span>
              <span class="text-[14.5px] leading-tight">아니오, 없습니다</span>
            </button>
          </div>
        </div>
      `;
    }

    function handleAnswer(val) {
      answers[step] = val;
      render(false);

      setTimeout(() => {
        if (val === 'yes') {
          view = 'd';
          render(true);
        } else {
          diseases = diseases.filter(d => d.qIndex !== step);
          goNext();
        }
      }, 200);
    }

    function ensureDiseaseExistsForStep(qIdx) {
      const stepDiseases = diseases.filter(d => d.qIndex === qIdx);
      if (stepDiseases.length === 0) {
        addDiseaseToStep(qIdx, false);
      } else if (!currentTabId || !diseases.find(d => d.id === currentTabId && d.qIndex === qIdx)) {
        currentTabId = stepDiseases[0].id;
      }
    }

    function addDiseaseToStep(qIdx, shouldScroll = true) {
      const newId = nextDiseaseId++;
      diseases.push({
        id: newId, qIndex: qIdx, type: 'disease', name: '', bodyPart: '',
        startDate: '', endDate: '', outPatientDays: '', medicineDays: '', hospitalDays: '',
        isHospitalized: false, isSurgery: false, treatment: '', remarks: '', criticalIllnesses: [],
        dateError: false, sequenceError: false, daysError: false, typeError: false, nameError: false, actionError: false
      });
      currentTabId = newId;

      if (view === 'd') {
        render(false);
        if (shouldScroll) {
          setTimeout(() => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            const tc = document.getElementById('tabs-container');
            if (tc) tc.scrollLeft = tc.scrollWidth;
          }, 50);
        }
      }
    }

    function switchTab(id) { currentTabId = id; render(false); }

    function removeDisease(id) {
      const stepDiseases = diseases.filter(d => d.qIndex === step);
      if (stepDiseases.length <= 1) return showToast("최소 1개의 병력은 입력해야 합니다.", true);
      diseases = diseases.filter(d => d.id !== id);
      currentTabId = diseases.filter(d => d.qIndex === step)[0].id;
      render(false);
    }

    function renderDetailView(qIdx) {
      const stepDiseases = diseases.filter(d => d.qIndex === qIdx);
      const d = diseases.find(d => d.id === currentTabId);
      if (!d) return '';

      const isQ5 = qIdx === 4;

      let tabsHtml = `<div class="flex items-center gap-2 overflow-x-auto pb-3 mb-4 snap-x hide-scrollbar" id="tabs-container">`;
      tabsHtml += stepDiseases.map((sd, i) => {
        const hasErr = sd.dateError || sd.daysError || sd.typeError || sd.nameError || sd.actionError || sd.sequenceError;
        return `<button onclick="switchTab(${sd.id})" class="relative snap-start shrink-0 px-5 py-3 rounded-full text-[15px] transition-all ${sd.id === currentTabId ? 'tab-active shadow-md' : 'tab-inactive'}">
          건수 ${i + 1} ${hasErr ? '<span class="w-2.5 h-2.5 bg-red-500 rounded-full absolute top-1 right-1 border-2 border-white"></span>' : ''}
        </button>`;
      }).join('');
      tabsHtml += `<button onclick="addDiseaseToStep(${qIdx})" class="snap-start shrink-0 px-4 py-3 rounded-full text-[14px] font-bold border-2 border-dashed border-slate-300 text-slate-500 bg-white flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>추가</button></div>`;

      let formHtml = `
        <div class="bg-white p-7 rounded-[2rem] card-shadow border border-white/50 pb-8" id="detail-form-area">
          <div class="flex justify-between items-center mb-7 pb-4 border-b border-slate-100">
            <div>
              <h3 class="font-extrabold text-slate-800 text-[20px] tracking-tight">상세 정보 작성</h3>
              <p class="text-[13px] text-indigo-500 font-bold mt-1.5 bg-indigo-50 inline-block px-2 py-0.5 rounded-md">※ '예'로 체크한 항목만 입력</p>
            </div>
            ${stepDiseases.length > 1 ? `<button onclick="removeDisease(${d.id})" class="text-[13px] font-bold text-red-500 bg-red-50 px-3.5 py-2 rounded-xl border border-red-100 active:scale-95 transition-all">삭제</button>` : ''}
          </div>
          
          <div class="space-y-8">
            <div class="${d.typeError ? 'box-error p-3 -mx-3 rounded-2xl' : ''}">
              <label class="flex items-center gap-2 text-[16px] font-extrabold text-slate-800 mb-3"><span class="bg-slate-100 w-6 h-6 rounded-full flex items-center justify-center text-[13px]">1</span> 분류 선택</label>
              <div class="grid grid-cols-2 gap-3">
                <button onclick="updateD('type', 'disease'); render(false);" class="h-14 rounded-2xl transition-all font-extrabold text-[15px] ${d.type === 'disease' ? 'btn-type-selected' : 'btn-unselected'}">🦠 질병(아픔)</button>
                <button onclick="updateD('type', 'injury'); render(false);" class="h-14 rounded-2xl transition-all font-extrabold text-[15px] ${d.type === 'injury' ? 'btn-type-selected' : 'btn-unselected'}">🩸 상해(다침)</button>
              </div>
            </div>

            ${isQ5 && d.type === 'disease' ? `
              <div class="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100/50 shadow-inner mb-4">
                <label class="flex justify-between items-center text-[15px] font-extrabold text-indigo-800 mb-3"><span class="flex items-center gap-1.5">🚨 11대 질환 해당 여부</span> <span class="text-[11px] text-indigo-500 bg-indigo-100 px-2 py-1 rounded-md font-bold">다중선택 가능</span></label>
                ${renderIllnessGrid(d.criticalIllnesses, true)}
              </div>` : ''}

            <div>
              <label class="flex justify-between items-center text-[16px] font-extrabold text-slate-800 mb-3"><span class="flex items-center gap-2"><span class="bg-slate-100 w-6 h-6 rounded-full flex items-center justify-center text-[13px]">2</span> ${d.type === 'disease' ? '어떤 질병인가요?' : '어떻게 다치셨나요?'}</span> <span class="text-[11px] text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md font-bold">필수</span></label>
              <input type="text" placeholder="${d.type === 'disease' ? '예: 위염, 고혈압 (약 이름 검색 가능)' : '예: 계단에서 넘어짐, 교통사고'}" value="${d.name}" oninput="this.classList.remove('input-error'); handleNameInput(this.value)" class="w-full h-[60px] px-5 bg-slate-50 border ${d.nameError ? 'input-error' : 'border-slate-200'} rounded-2xl text-[16px] outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition-all font-bold shadow-sm">
              <div id="suggest-box"></div>
              
              ${d.type === 'injury' ? `
                <div class="mt-6">
                  <label class="flex justify-between items-center text-[16px] font-extrabold text-slate-800 mb-3"><span class="flex items-center gap-2"><span class="bg-slate-100 w-6 h-6 rounded-full flex items-center justify-center text-[13px]">!</span> 어느 부위를 다치셨나요?</span> <span class="text-[11px] text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md font-bold">필수</span></label>
                  <input type="text" placeholder="예: 오른쪽 무릎, 허리" value="${d.bodyPart}" oninput="this.classList.remove('input-error'); updateD('bodyPart', this.value)" class="w-full h-[60px] px-5 bg-slate-50 border ${d.nameError ? 'input-error' : 'border-slate-200'} rounded-2xl text-[16px] outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition-all font-bold shadow-sm">
                </div>
              ` : ''}
            </div>

            <div>
              <label class="flex justify-between items-center text-[16px] font-extrabold text-slate-800 mb-3"><span class="flex items-center gap-2"><span class="bg-slate-100 w-6 h-6 rounded-full flex items-center justify-center text-[13px]">3</span> 내원 기간</span> <span class="text-[11px] text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md font-bold">필수</span></label>
              <div class="flex items-center gap-2">
                <input type="month" value="${d.startDate}" onchange="updateD('startDate', this.value)" class="flex-1 h-[60px] bg-slate-50 border ${d.dateError || d.sequenceError ? 'input-error' : 'border-slate-200'} rounded-2xl text-center text-[16px] outline-none font-bold focus:border-indigo-500 shadow-sm">
                <span class="text-slate-300 font-extrabold text-[20px]">~</span>
                <input type="month" value="${d.endDate}" onchange="updateD('endDate', this.value)" class="flex-1 h-[60px] bg-slate-50 border ${d.dateError || d.sequenceError ? 'input-error' : 'border-slate-200'} rounded-2xl text-center text-[16px] outline-none font-bold focus:border-indigo-500 shadow-sm">
              </div>
              ${d.sequenceError ? `<p class="text-red-500 text-[13.5px] font-bold mt-2 ml-1">🚨 시작일이 종료일보다 나중입니다!</p>` : ''}
            </div>

            <div class="${d.daysError ? 'box-error p-3 -mx-3 rounded-2xl' : ''}">
              <label class="flex justify-between items-center text-[16px] font-extrabold text-slate-800 mb-4"><span class="flex items-center gap-2"><span class="bg-slate-100 w-6 h-6 rounded-full flex items-center justify-center text-[13px]">4</span> 진료 상세</span> <span class="text-[11px] text-slate-500 bg-slate-100 px-2 py-1 rounded-md font-bold">숫자만 입력</span></label>
              <div class="grid grid-cols-2 gap-3 mb-5">
                <div class="flex flex-col gap-1.5"><span class="text-[13.5px] font-bold text-slate-500 text-center">통원 일수</span><div class="flex items-center bg-slate-50 border border-slate-200 rounded-2xl px-3 h-[52px] focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-50 transition-all shadow-sm"><input type="tel" value="${d.outPatientDays}" oninput="updateD('outPatientDays', this.value)" class="w-full text-center font-extrabold text-[17px] bg-transparent outline-none"><span class="text-slate-400 text-[14px] font-bold">일</span></div></div>
                <div class="flex flex-col gap-1.5"><span class="text-[13.5px] font-bold text-slate-500 text-center">약처방 일수</span><div class="flex items-center bg-slate-50 border border-slate-200 rounded-2xl px-3 h-[52px] focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-50 transition-all shadow-sm"><input type="tel" value="${d.medicineDays}" oninput="updateD('medicineDays', this.value)" class="w-full text-center font-extrabold text-[17px] bg-transparent outline-none"><span class="text-slate-400 text-[14px] font-bold">일</span></div></div>
              </div>
              
              <div class="flex flex-col gap-4">
                <div class="bg-indigo-50/30 border border-indigo-50/50 rounded-[1.25rem] p-4">
                  <label class="flex items-center gap-2 text-[15.5px] font-extrabold text-slate-800 mb-3"><span class="text-[18px]">🏥</span> 입원하셨나요?</label>
                  <div class="flex gap-2.5">
                    <button onclick="updateD('isHospitalized', true); render(false);" class="flex-1 h-[52px] rounded-xl font-extrabold text-[15px] transition-all flex items-center justify-center gap-1.5 ${d.isHospitalized ? 'bg-indigo-600 text-white shadow-md ring-2 ring-indigo-200/50' : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-50'}">네⭕</button>
                    <button onclick="updateD('isHospitalized', false); render(false);" class="flex-1 h-[52px] rounded-xl font-extrabold text-[15px] transition-all flex items-center justify-center gap-1.5 ${!d.isHospitalized ? 'bg-slate-700 text-white shadow-md ring-2 ring-slate-200' : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-50'}">아니오❌</button>
                  </div>
                </div>
                
                ${d.isHospitalized ? `
                  <div class="bg-indigo-50/50 p-4 -mt-2 rounded-2xl border border-indigo-100 flex items-center justify-between animate-slide-down shadow-inner">
                    <span class="text-[14.5px] font-bold text-indigo-700 pl-1">며칠 입원하셨나요?</span>
                    <div class="flex items-center gap-1.5 focus-within:scale-105 transition-all">
                      <input type="tel" placeholder="0" value="${d.hospitalDays}" oninput="updateD('hospitalDays', this.value)" class="w-16 h-11 bg-white border border-indigo-200 rounded-xl text-center font-extrabold text-indigo-600 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 text-[17px] shadow-sm">
                      <span class="font-extrabold text-indigo-700">일</span>
                    </div>
                  </div>
                ` : ''}

                <div class="bg-indigo-50/30 border border-indigo-50/50 rounded-[1.25rem] p-4">
                  <label class="flex items-center gap-2 text-[15.5px] font-extrabold text-slate-800 mb-3"><span class="text-[18px]">🔪</span> 수술하셨나요?</label>
                  <div class="flex gap-2.5">
                    <button onclick="updateD('isSurgery', true); render(false);" class="flex-1 h-[52px] rounded-xl font-extrabold text-[15px] transition-all flex items-center justify-center gap-1.5 ${d.isSurgery ? 'bg-indigo-600 text-white shadow-md ring-2 ring-indigo-200/50' : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-50'}">네⭕</button>
                    <button onclick="updateD('isSurgery', false); render(false);" class="flex-1 h-[52px] rounded-xl font-extrabold text-[15px] transition-all flex items-center justify-center gap-1.5 ${!d.isSurgery ? 'bg-slate-700 text-white shadow-md ring-2 ring-slate-200' : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-50'}">아니오❌</button>
                  </div>
                </div>
              </div>
            </div>

            <div>
              <label class="flex items-center gap-2 text-[16px] font-extrabold text-slate-800 mb-3"><span class="bg-slate-100 w-6 h-6 rounded-full flex items-center justify-center text-[13px]">5</span> 치료 방법 및 기타 전할말</label>
              <textarea rows="3" placeholder="${d.type === 'injury' ? '물리치료, 핀제거술 등 자유롭게 적어주세요.' : '용종제거, 추적관찰 중 등 구체적으로 적어주세요.'}" oninput="updateD('treatment', this.value)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-[15px] font-medium outline-none resize-none leading-relaxed focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition-all shadow-sm">${d.treatment}</textarea>
            </div>
            
            <div class="pt-8 border-t border-slate-100 mt-8 relative">
              <div class="absolute top-[-14px] left-1/2 transform -translate-x-1/2 bg-white px-4 text-slate-300"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6z"/></svg></div>
              <p class="text-[14px] text-indigo-600 font-extrabold text-center mb-4 mt-2">같은 질문에 해당하는 다른 병력이 더 있나요?</p>
              <button onclick="addDiseaseToStep(${qIdx})" class="w-full h-[60px] rounded-2xl font-extrabold text-[16px] bg-indigo-50 border-2 border-indigo-100 text-indigo-600 shadow-sm flex items-center justify-center gap-2 hover:bg-indigo-100 hover:border-indigo-200 transition-all active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg> 병력 하나 더 추가하기
              </button>
            </div>

          </div>
        </div>
      `;

      return tabsHtml + formHtml;
    }

    function updateD(f, v) {
      const d = diseases.find(d => d.id === currentTabId);
      if (d) {
        d[f] = v;
        if (f === 'name') d.nameError = false;
        if (f === 'startDate' || f === 'endDate') { d.dateError = false; d.sequenceError = false; }
        if (f === 'outPatientDays' || f === 'medicineDays' || f === 'hospitalDays') d.daysError = false;
        saveData();
      }
    }

    function toggleD(f) {
      const d = diseases.find(d => d.id === currentTabId);
      if (d) {
        d[f] = !d[f];
        if (f === 'isHospitalized' && !d[f]) d.hospitalDays = '';
        d.daysError = false;
        saveData();
      }
    }

    function toggleCritical(i) {
      const d = diseases.find(d => d.id === currentTabId);
      if (d) {
        if (d.criticalIllnesses.includes(i)) d.criticalIllnesses = d.criticalIllnesses.filter(x => x !== i);
        else d.criticalIllnesses.push(i);
        render(false);
      }
    }

    function handleNameInput(val) {
      updateD('name', val);
      const d = diseases.find(d => d.id === currentTabId);
      if (d && d.type === 'injury') return;
      const box = document.getElementById('suggest-box');
      if (!val) { box.innerHTML = ''; return; }

      let matched = [];
      const kw = val.toLowerCase().replace(/\s/g, "");
      for (let k in diseaseLibrary) {
        if (k.includes(kw) || kw.includes(k)) matched = [...matched, ...diseaseLibrary[k]];
        diseaseLibrary[k].forEach(dn => { if (dn.replace(/\s/g, "").includes(kw)) matched.push(dn); });
      }
      matched = [...new Set(matched)].slice(0, 6);

      if (matched.length) {
        box.innerHTML = `<div class="mt-2 p-3 bg-blue-50/80 rounded-xl border border-blue-100 flex flex-wrap gap-1.5"><span class="w-full text-[11px] font-extrabold text-blue-600 mb-1">💡 추천 병명</span>${matched.map(m => `<div onclick="updateD('name', '${m}'); document.getElementById('suggest-box').innerHTML='';" class="suggest-chip">${m}</div>`).join('')}</div>`;
      } else box.innerHTML = '';
    }

    function renderSummaryView() {
      let html = `<div class="bg-white p-8 rounded-[2rem] card-shadow border border-white/50 text-center relative overflow-hidden">
        <div class="absolute top-0 right-0 w-40 h-40 bg-gradient-to-br from-green-100 to-emerald-50 rounded-full blur-3xl -mr-16 -mt-16 opacity-70"></div>
        <div class="relative z-10">
          <div class="w-20 h-20 bg-gradient-to-br from-green-400 to-emerald-500 text-white rounded-full flex items-center justify-center text-[36px] mx-auto mb-6 shadow-xl shadow-green-500/30 ring-8 ring-green-50 border-4 border-white transform scale-110">🎉</div>
          <h2 class="text-[24px] font-extrabold text-slate-800 mb-3 tracking-tight">작성이 완료되었습니다!</h2>
          <p class="text-[15.5px] text-slate-500 mb-8 font-medium">아래 버튼을 눌러 결과 텍스트를<br><strong class="text-slate-700">카카오톡이나 문자로 공유</strong>해주세요</p>
          
          <div class="bg-slate-50/80 backdrop-blur-sm rounded-[1.5rem] p-6 text-left border border-slate-100 shadow-inner">
            <h3 class="font-extrabold text-slate-700 mb-4 border-b border-slate-200/60 pb-3 text-[15px] flex items-center justify-between">
              <span>체크 결과 요약</span>
              <span class="text-[12px] bg-slate-200 text-slate-500 px-2 py-0.5 rounded-md font-bold">전송 대기 중</span>
            </h3>
            <ul class="space-y-3 text-[14.5px] font-medium">`;

      for (let i = 0; i < 6; i++) {
        const isYes = answers[i] === 'yes';
        html += `<li class="flex items-center justify-between p-2 rounded-lg ${isYes ? 'bg-indigo-50/50' : 'hover:bg-slate-100'} transition-colors"><span class="text-slate-600 flex items-center gap-2"><span class="w-6 h-6 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center text-[11px] font-extrabold">Q${i + 1}</span></span> <span class="font-extrabold ${isYes ? 'text-indigo-600' : 'text-slate-400'}">${isYes ? '예 (있음)' : '아니오'}</span></li>`;
      }

      const totalDiseases = diseases.filter(d => d.name || d.startDate).length;
      html += `</ul>
            <div class="mt-5 pt-4 border-t border-slate-200/60 flex justify-between items-center font-extrabold text-[15.5px]">
              <span class="text-slate-800">작성한 상세 병력</span>
              <span class="${totalDiseases > 0 ? 'text-indigo-600 bg-indigo-100 ring-2 ring-indigo-50' : 'text-slate-500 bg-slate-200'} px-3 py-1 rounded-xl shadow-sm">${totalDiseases}건</span>
            </div>
          </div>
        </div>
      </div>`;
      return html;
    }

    function goBack() {
      if (view === 'q' && step === 0) { view = 'intro'; render(true); }
      else if (view === 'd') { view = 'q'; render(true); }
      else if (step > 0) {
        step--;
        if (answers[step] === 'yes') view = 'd';
        else view = 'q';
        render(true);
      }
    }

    function goNext() {
      step++;
      view = 'q';
      if (step > 5) view = 'summary';
      render(true);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function validateAndNext() {
      const stepDiseases = diseases.filter(d => d.qIndex === step);
      let isValid = true, firstErr = null, msg = "";

      stepDiseases.forEach(d => {
        d.dateError = false; d.sequenceError = false; d.daysError = false; d.nameError = false; d.typeError = false;

        if (!d.type) { d.typeError = true; isValid = false; if (!msg) msg = "질병/상해 구분을 선택해주세요."; }
        if (!d.name.trim()) { d.nameError = true; isValid = false; if (!msg) msg = d.type === 'disease' ? "어떤 질병인지 입력해주세요." : "사고 내용을 입력해주세요."; }
        if (d.type === 'injury' && !d.bodyPart.trim()) { d.nameError = true; isValid = false; if (!msg) msg = "다친 부위를 입력해주세요."; }

        if (!d.startDate || !d.endDate) { d.dateError = true; isValid = false; if (!msg) msg = "내원 기간을 입력해주세요."; }
        else if (new Date(d.startDate) > new Date(d.endDate)) { d.sequenceError = true; isValid = false; if (!msg) msg = "시작일이 종료일보다 늦습니다."; }
        else {
          const limit = questions[step].limit;
          if (d.startDate < limit && step !== 5) {
            d.dateError = true; isValid = false; if (!msg) msg = questions[step].limitMsg;
          }
        }

        const outD = parseInt(d.outPatientDays) || 0, medD = parseInt(d.medicineDays) || 0, hosD = parseInt(d.hospitalDays) || 0;
        if (outD === 0 && medD === 0 && hosD === 0 && !d.isSurgery && !d.isHospitalized) {
          d.daysError = true; isValid = false; if (!msg) msg = "진료 일수(또는 수술/입원 여부)를 입력해주세요.";
        }
        if (d.isHospitalized && hosD === 0) { d.daysError = true; isValid = false; if (!msg) msg = "입원 일수를 정확히 입력해주세요."; }

        if (!isValid && !firstErr) firstErr = d.id;
      });

      if (!isValid) {
        showToast(msg, true);
        if (firstErr) switchTab(firstErr);
        return;
      }
      goNext();
    }

    // 🌟 핵심 로직: 공유하기 UI (업데이트됨)
    function updateActionBtn(text, disabled, isShare = false) {
      const bContainer = document.getElementById('action-btn-container');

      if (isShare) {
        bContainer.innerHTML = `
          <button id="action-btn" onclick="executeShare()" class="w-full h-[64px] rounded-2xl font-extrabold text-[18px] bg-[#FEE500] hover:bg-[#F4DC00] text-[#000000] shadow-[0_8px_20px_rgba(254,229,0,0.3)] active:scale-95 transition-all flex items-center justify-center gap-2">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-5.523 0-10 3.51-10 7.846 0 2.802 1.83 5.257 4.545 6.551-.309 1.135-1.12 4.14-1.144 4.25-.03.136.044.204.137.144.072-.047 3.315-2.222 4.67-3.134.58.077 1.173.118 1.792.118 5.523 0 10-3.51 10-7.846S17.523 3 12 3z"/></svg> 
            <span id="action-text">카톡이나 문자로 결과 보내기</span>
          </button>
          <p class="text-center text-[13px] font-bold text-slate-400 mt-3 mb-1">버튼을 누르면 전송할 앱(카카오톡 등)을 선택할 수 있어요!</p>
        `;
      } else {
        if (view === 'intro') {
          bContainer.innerHTML = `<button id="action-btn" onclick="handleActionClick()" class="w-full h-[64px] rounded-2xl font-extrabold text-[18px] bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-[0_8px_25px_rgba(79,70,229,0.4)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 animate-gentle-pulse"><span id="action-text">${text}</span></button>`;
        } else if (disabled) {
          bContainer.innerHTML = `<button id="action-btn" disabled class="w-full h-[64px] rounded-2xl font-extrabold text-[18px] bg-slate-100 text-slate-400 border border-slate-200 cursor-not-allowed transition-all flex items-center justify-center gap-2"><span id="action-text">${text}</span></button>`;
        } else {
          bContainer.innerHTML = `<button id="action-btn" onclick="handleActionClick()" class="w-full h-[64px] rounded-2xl font-extrabold text-[18px] bg-slate-800 text-white shadow-xl shadow-slate-800/20 active:scale-95 transition-all flex items-center justify-center gap-2 hover:bg-slate-700"><span id="action-text">${text}</span></button>`;
        }
      }
    }

    function handleActionClick() {
      if (view === 'intro') { view = 'q'; render(true); return; }
      if (view === 'q') return;
      if (view === 'd') validateAndNext();
    }

    // 🌟 핵심 로직: Web Share API 적용 (업데이트됨)
    function executeShare() {
      const text = generateReportText();
      
      // 1. Web Share API를 지원하는 기기인지 확인
      if (navigator.share) {
        navigator.share({
          title: '하나린보험 🌸 알릴 의무 리포트', 
          text: text
        })
        .then(() => {
          console.log('공유 성공');
        })
        .catch((error) => {
          console.log('공유 취소 또는 에러:', error);
        });
      } 
      // 2. Web Share API를 지원하지 않는 구형 브라우저나 환경 (예비책: 기존 복사 기능)
      else {
        syncCopy(text);
        const isKakao = /KAKAOTALK/i.test(navigator.userAgent);
        
        if (isKakao) {
          alert("✅ 입력하신 병력 내용이 안전하게 복사되었습니다.\n\n[확인]을 누르시면 보고 계시던 화면이 닫히며 원래 대화방으로 되돌아갑니다.\n문자 입력창을 꾹 눌러서 '붙여넣기'만 해주시면 끝납니다!");
          window.location.href = 'kakaotalk://inappbrowser/close';
        } else {
          showToast("✅ 복사 완료! 원하시는 메신저 창에 '붙여넣기' 해주세요.", false);
        }
      }
    }

    function syncCopy(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.top = "0";
      ta.style.left = "0";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand('copy'); } catch (err) {}
      document.body.removeChild(ta);
    }

    function generateReportText() {
      let r = `📋 [계약 전 알릴 의무 리포트]\n작성일시: ${new Date().toLocaleString()}\n\n■ 기본 응답\n`;
      for (let i = 0; i < 6; i++) r += `[Q${i + 1}] ${answers[i] === 'yes' ? '🔴 예' : '🟢 아니오'}\n`;

      const filledDiseases = diseases.filter(d => d.name || d.startDate);
      if (filledDiseases.length === 0) {
        r += "\n✨ 이상 없음!\n";
      } else {
        r += "\n■ 상세 내용\n";
        filledDiseases.forEach((d, i) => {
          const typeEmoji = d.type === 'disease' ? '🦠 질병' : '🩸 상해';
          r += `\n< 건수 ${i + 1} (${typeEmoji}) >\n`;
          if (d.type === 'disease') {
            r += `1. 질병명: ${d.name}${d.criticalIllnesses.length ? ` (11대: ${d.criticalIllnesses.join(',')})` : ''}\n`;
          } else {
            r += `1. 사고내용: ${d.name}\n2. 다친부위: ${d.bodyPart}\n`;
          }
          r += `${d.type === 'disease' ? '2' : '3'}. 내원기간: ${d.startDate}~${d.endDate}\n`;
          r += `${d.type === 'disease' ? '3' : '4'}. 진료: 통원 ${d.outPatientDays || 0}일/약 ${d.medicineDays || 0}일/입원 ${d.hospitalDays || 0}일\n`;
          r += `${d.type === 'disease' ? '4' : '5'}. 여부: 입원(${d.isHospitalized ? 'O' : 'X'})/수술(${d.isSurgery ? 'O' : 'X'})\n`;
          const tIdx = d.type === 'disease' ? '5' : '6';
          r += `${tIdx}. 치료: ${d.treatment || '없음'}\n`;
        });
      }

      r += "\n========================\n위와 같이 고지사항 작성을 완료했습니다.\n확인 부탁드립니다! 😊\n";
      return r;
    }

    function showToast(m, isE) {
      const t = document.getElementById('toast'), c = document.getElementById('toast-content');
      t.classList.remove('hidden'); t.classList.add('toast-enter');
      c.className = `flex flex-col gap-1.5 px-5 py-4 rounded-2xl shadow-xl text-[14.5px] font-bold text-white bg-slate-800 border-l-4 ${isE ? 'border-red-500' : 'border-green-400'} text-center leading-relaxed z-[999]`;
      c.innerHTML = `<span>${m}</span>`;
      setTimeout(() => { t.classList.remove('toast-enter'); t.classList.add('hidden'); }, 3500);
    }

    function init() {
      try {
        try { history.pushState(null, null, location.href); } catch (e) { }
        let loaded = false;
        try {
          const s = localStorage.getItem(STORAGE_KEY);
          if (s) {
            const p = JSON.parse(s);
            step = p.step || 0; view = p.view || 'intro'; answers = p.answers || {}; diseases = p.diseases || [];
            currentTabId = p.currentTabId; nextDiseaseId = p.nextDiseaseId || 1;
            loaded = true;
          }
        } catch (e) { }
      } catch (err) {
        console.warn("Init error bypass");
      } finally {
        render(false);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      init();
    });

  </script>
</body>

</html>
