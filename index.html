<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>계약 전 알릴 의무 사항</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #f8faff;
      word-break: keep-all;
      overflow-x: hidden;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .card-shadow {
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
    }

    .tab-active {
      background-color: #111827;
      color: white;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(17, 24, 39, 0.2);
      transform: translateY(-1px);
    }

    .tab-inactive {
      background-color: white;
      color: #64748b;
      font-weight: 600;
      border: 1px solid #e2e8f0;
    }

    .btn-type-selected {
      background-color: #4f46e5;
      border: 2px solid #4f46e5;
      color: white;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
      transform: translateY(-1px);
    }

    .btn-unselected {
      background-color: #f8fafc;
      border: 2px solid #e2e8f0;
      color: #64748b;
      font-weight: 600;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-error {
      border-color: #ef4444 !important;
      background-color: #fef2f2 !important;
      animation: shake 0.5s both;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2) !important;
    }

    .box-error {
      border: 2px solid #ef4444 !important;
      background-color: #fef2f2 !important;
      animation: shake 0.5s both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    @keyframes slideUpFade {
      0% { transform: translate(-50%, 30px) scale(0.95); opacity: 0; }
      100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
    }

    .toast-enter {
      animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes swipeLeft {
      0% { opacity: 0; transform: translateX(30px) scale(0.98); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }

    .animate-swipe-left {
      animation: swipeLeft 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-slide-down {
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 15px rgba(79, 70, 229, 0.2); }
      50% { transform: scale(1.02); box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4); }
    }

    .animate-gentle-pulse {
      animation: gentlePulse 2.5s infinite ease-in-out;
    }

    .pb-safe {
      padding-bottom: calc(env(safe-area-inset-bottom) + 16px);
    }

    .suggest-chip {
      background-color: #eef2ff;
      color: #4f46e5;
      border: 1px solid #c7d2fe;
      font-size: 13.5px;
      padding: 6px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 5px rgba(79, 70, 229, 0.05);
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }

    .glass-bottom {
      background: linear-gradient(to top, rgba(255, 255, 255, 0.95) 60%, rgba(255, 255, 255, 0));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* 이미지 캡처 전용 스타일 (하나린보험🌸 같은 워터마크 완전 제거) */
    #summary-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
      padding: 32px 24px;
      max-width: 420px;
      margin: 0 auto;
    }
  </style>
</head>

<body class="text-slate-800 antialiased selection:bg-indigo-100 bg-[#f8faff]">

  <div class="max-w-md mx-auto bg-transparent min-h-screen flex flex-col relative pb-32 overflow-hidden shadow-xl shadow-slate-200/50">

    <div class="sticky top-0 z-50 glass-nav shadow-sm">
      <div class="flex items-center justify-between px-5 h-16">
        <button id="back-btn" onclick="goBack()"
          class="text-slate-700 bg-white border border-slate-200 font-bold px-3.5 py-2 -ml-2 flex items-center gap-1.5 rounded-xl active:scale-90 transition-all shadow-sm hover:shadow-md">
          <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
          </svg>
          <span class="text-[13px] tracking-tight">이전</span>
        </button>
        <span id="header-title" class="font-extrabold text-[17px] tracking-tight truncate mx-2 text-slate-800">계약 전 알릴 의무</span>
        <button onclick="resetAll()"
          class="text-[13px] font-bold text-slate-500 bg-slate-50 border border-slate-200 px-3 py-2 rounded-xl active:scale-95 transition-all flex items-center gap-1 shrink-0 hover:bg-slate-100">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          리셋
        </button>
      </div>
      <div class="w-full bg-slate-100 h-1.5 overflow-hidden">
        <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full transition-all duration-700 ease-out w-[0%] rounded-r-full shadow-[0_0_10px_rgba(99,102,241,0.5)]"></div>
      </div>
    </div>

    <div id="app-container" class="px-5 pt-6 pb-10 flex-1"></div>

    <div id="action-btn-container" class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md px-5 pt-4 pb-6 glass-bottom border-t border-slate-100/50 z-40 pb-safe"></div>
  </div>

  <div id="toast" class="fixed top-12 left-1/2 transform -translate-x-1/2 hidden z-50 w-[90%] max-w-sm pointer-events-none z-[999]">
    <div id="toast-content" class="flex flex-col gap-1 px-5 py-4 rounded-2xl shadow-xl text-[14.5px] font-bold text-white leading-relaxed"></div>
  </div>

  <script>
    const today = new Date();
    const formatDate = (d) => `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
    const calcDate = (m, y = 0) => { const d = new Date(today); d.setMonth(d.getMonth() - m); d.setFullYear(d.getFullYear() - y); return formatDate(d); };
    const getMonthOffset = (m, y = 0) => { const d = new Date(today); d.setMonth(d.getMonth() - m); d.setFullYear(d.getFullYear() - y); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; };

    const date3m = calcDate(3); const limit3m = getMonthOffset(3);
    const date1y = calcDate(0, 1); const limit1y = getMonthOffset(0, 1);
    const date5y = calcDate(0, 5); const limit5y = getMonthOffset(0, 5);
    const date10y = calcDate(0, 10); const limit10y = getMonthOffset(0, 10);

    const diseaseLibrary = { /* 기존 diseaseLibrary 그대로 유지 */ 
      "우루사": ["간수치상승", "지방간", "B형간염", "간염"], "고덱스": ["간수치상승", "지방간", "간염"],
      "타이레놀": ["감기", "두통", "발열", "몸살"], "수면": ["불면증", "수면무호흡증", "수면다원검사", "수면제처방"],
      "우울": ["우울증", "공황장애", "불면증", "신경안정제"], "검사": ["건강검진", "위내시경", "대장내시경", "초음파", "조직검사", "혈액검사", "MRI", "CT"],
      "수치": ["간수치상승", "콜레스테롤상승", "혈당상승", "혈압상승"], "약": ["고혈압약", "당뇨약", "고지혈증약", "갑상선약"],
      "머리": ["두통", "편두통", "뇌수막염", "어지럼증", "뇌진탕"], "두통": ["편두통", "긴장성두통", "군발두통"],
      "허리": ["허리디스크", "척추관협착증", "요추염좌", "척추측만증"], "목": ["목디스크", "거북목증후군", "일자목", "편도염", "인후염"],
      "어깨": ["오십견", "회전근개파열", "석회성건염", "어깨충돌증후군"], "위": ["위염", "위궤양", "역류성식도염", "위용종", "헬리코박터균", "소화불량"],
      "장": ["장염", "대장용종", "과민성대장증후군", "치질(치핵/치루)", "맹장염", "대장염"], "간": ["지방간", "B형간염", "C형간염", "간경화", "간수치상승", "간혈관종"],
      "피": ["고지혈증", "고혈압", "당뇨병", "고콜레스테롤혈증", "빈혈"], "혈압": ["고혈압", "고지혈증", "당뇨병", "협심증"],
      "당뇨": ["당뇨병", "당뇨전단계", "임신성당뇨"], "감기": ["상기도감염", "코로나19", "독감", "폐렴", "기관지염", "비염", "천식"],
      "기침": ["기관지염", "천식", "폐렴", "인후염", "역류성식도염"], "코": ["비염", "축농증(부비동염)", "코골이", "수면무호흡증"],
      "귀": ["중이염", "외이도염", "이석증", "메니에르병", "이명"], "눈": ["백내장", "녹내장", "안구건조증", "결막염", "망막병증", "시력교정술"],
      "여자": ["자궁근종", "난소낭종", "자궁내막증", "질염", "다낭성난소증후군", "방광염"], "자궁": ["자궁근종", "자궁경부이형성증", "자궁내막증", "자궁경부염"],
      "가슴": ["유방결절", "유방섬유선종", "유방낭종", "협심증", "부정맥"], "갑상": ["갑상선결절", "갑상선기능항진증", "갑상선기능저하증", "갑상선염"],
      "피부": ["아토피", "두드러기", "접촉성피부염", "습진", "무좀", "대상포진", "티눈"], "뼈": ["골절", "골다공증", "관절염", "통풍", "류마티스"],
      "관절": ["퇴행성관절염", "류마티스관절염", "통풍", "십자인대파열", "반월상연골파열"], "소변": ["방광염", "요로결석", "전립선비대증", "전립선염", "신우신염"],
      "치아": ["충치", "치주염", "임플란트", "사랑니발치", "치석제거"]
    };

    const criticalIllnessesList = ["암", "백혈병", "고혈압", "협심증", "심근경색", "심장판막증", "간경화증", "뇌졸중증", "당뇨병", "에이즈", "직장/항문질환"];

    const questions = [ /* 기존 questions 배열 그대로 유지 */ 
      { periodLabel: "최근 3개월 이내", dateBadge: date3m + " 이후", text: "아래 항목 중 <span class='text-indigo-600'>해당하는 내역</span>이 있습니까?<br><span class='flex flex-wrap gap-2 mt-4 text-[15.5px] font-bold'><span class='bg-indigo-50 text-indigo-700 px-3.5 py-1.5 rounded-xl border border-indigo-100 shadow-sm shrink-0'>질병 확정진단</span><span class='bg-indigo-50 text-indigo-700 px-3.5 py-1.5 rounded-xl border border-indigo-100 shadow-sm shrink-0'>질병 의심소견</span><span class='bg-indigo-50 text-indigo-700 px-3.5 py-1.5 rounded-xl border border-indigo-100 shadow-sm shrink-0'>치료</span><span class='bg-purple-50 text-purple-700 px-3.5 py-1.5 rounded-xl border border-purple-100 shadow-sm shrink-0'>입원</span><span class='bg-purple-50 text-purple-700 px-3.5 py-1.5 rounded-xl border border-purple-100 shadow-sm shrink-0'>수술</span><span class='bg-purple-50 text-purple-700 px-3.5 py-1.5 rounded-xl border border-purple-100 shadow-sm shrink-0'>투약</span></span>", limit: limit3m, limitMsg: "3개월 이내 내역을 적어주세요.", desc: ["<strong class='text-blue-600'>질병의심소견이란?</strong> 의사가 진단서, 소견서, 진료의뢰서를 교부한 경우", "<strong class='text-blue-600'>투약이란?</strong> 약을 처방받은 행위 (안 먹었어도 고지)"] },
      { periodLabel: "최근 3개월 이내", dateBadge: date3m + " 이후", text: "혈압약, 수면제, 진통제 등 약물을 드신 적이 있습니까?", limit: limit3m, limitMsg: "3개월 이내 내역을 적어주세요." },
      { periodLabel: "최근 1년 이내", dateBadge: date1y + " 이후", text: "의사로부터 진찰 또는 검사를 통하여 추가검사(재검사)를 받은 사실이 있습니까?", limit: limit1y, limitMsg: "1년 이내 내역을 적어주세요.", desc: ["<span class='block mb-1'><strong class='text-indigo-700 text-[15.5px]'>🔍 추가검사란?</strong></span><span class='block mb-2.5 text-[14.5px] text-slate-700 leading-[1.6]'>검사결과 <strong class='text-red-600 bg-red-50 px-1 rounded'>이상 소견</strong>이 확인되어 보다 정확한 진단을 위해 시행한 검사를 의미합니다.</span><span class='block bg-white border border-indigo-100 px-3 py-2.5 rounded-lg text-[14px] text-slate-600 leading-[1.6]'><strong class='text-slate-800 bg-slate-100 px-1.5 py-0.5 rounded text-[12.5px] mr-1.5 align-text-bottom'>※ 제외 대상</strong>병증 치료 필요 없이 유지되는 상태에서 시행하는 <strong class='text-indigo-600 font-extrabold'>정기검사 및 추적관찰</strong>은 포함되지 않습니다.</span>"] },
      { periodLabel: "최근 5년 이내", dateBadge: date5y + " 이후", text: "아래 항목 중 <span class='text-indigo-600'>해당하는 내역</span>이 있습니까?<br><span class='flex flex-wrap gap-2 mt-4 text-[15.5px] font-bold'><span class='bg-purple-50 text-purple-700 px-3.5 py-1.5 rounded-xl border border-purple-100 shadow-sm shrink-0'>🏥 입원</span><span class='bg-purple-50 text-purple-700 px-3.5 py-1.5 rounded-xl border border-purple-100 shadow-sm shrink-0'>🔪 수술</span><span class='bg-indigo-50 text-indigo-700 px-3.5 py-1.5 rounded-xl border border-indigo-100 shadow-sm shrink-0'>계속하여 7일 이상 치료</span><span class='bg-indigo-50 text-indigo-700 px-3.5 py-1.5 rounded-xl border border-indigo-100 shadow-sm shrink-0'>계속하여 30일 이상 투약</span></span>", limit: limit5y, limitMsg: "5년 이내 내역을 적어주세요.", desc: ["<span class='block mb-1.5'><strong class='text-indigo-700 text-[15px]'>💡 '계속하여'란?</strong></span><span class='block text-[14.5px] text-slate-700 leading-[1.6]'><strong class='text-red-600 bg-red-50 px-1 rounded'>같은 원인으로</strong> 치료 또는 투약받은 <strong class='text-indigo-600 underline decoration-indigo-200 underline-offset-4 decoration-2'>총 일수</strong>를 뜻합니다.</span>"] },
      { periodLabel: "최근 5년 이내", dateBadge: date5y + " 이후", text: "아래 질병으로 진단│치료│입원│수술│정밀검사를 받은 적이 있습니까?", hasList: true, limit: limit5y, limitMsg: "5년 이내 내역을 적어주세요." },
      { periodLabel: "최근 10년 이내", dateBadge: date10y + " 이후", text: "병원에서 진찰/검사를 받고 입원이나 수술을 한 적이 있습니까?", limit: limit10y, limitMsg: "10년 이내 내역을 적어주세요." }
    ];

    let step = 0;
    let view = 'intro';
    let answers = {};
    let diseases = [];
    let currentTabId = null;
    let nextDiseaseId = 1;

    const STORAGE_KEY = 'insurance_wizard_v19_final_share';

    function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ step, view, answers, diseases, currentTabId, nextDiseaseId })); } catch (e) {} }
    function loadData() { try { const s = localStorage.getItem(STORAGE_KEY); if (s) { const p = JSON.parse(s); step = p.step || 0; view = p.view || 'intro'; answers = p.answers || {}; diseases = p.diseases || []; currentTabId = p.currentTabId; nextDiseaseId = p.nextDiseaseId || 1; } } catch (e) {} }
    function resetAll() { try { localStorage.removeItem(STORAGE_KEY); } catch (e) {} step = 0; view = 'intro'; answers = {}; diseases = []; currentTabId = null; nextDiseaseId = 1; render(true); showToast("처음부터 다시 시작합니다."); }

    function render(animate = true) {
      saveData();
      const container = document.getElementById('app-container');
      const headerTitle = document.getElementById('header-title');
      const progressBar = document.getElementById('progress-bar');
      const backBtn = document.getElementById('back-btn');

      container.classList.remove('animate-swipe-left');
      if (animate) void container.offsetWidth;
      container.classList.add('animate-swipe-left');

      if (view === 'intro') {
        headerTitle.innerText = `계약 전 알릴 의무 사항`;
        progressBar.style.width = `0%`;
        backBtn.style.visibility = 'hidden';
        container.innerHTML = renderIntroView();
        updateActionBtn('네, 동의하고 시작할게요', false);
      } else if (step < 6) {
        const progress = Math.round(((step) / 6) * 100);
        progressBar.style.width = `${progress}%`;
        backBtn.style.visibility = 'visible';

        if (view === 'q') {
          headerTitle.innerText = `질문 ${step + 1} / 6`;
          container.innerHTML = renderQuestionView(step);
          updateActionBtn('질문을 선택해주세요', true);
        } else if (view === 'd') {
          headerTitle.innerText = `상세 입력 (Q${step + 1})`;
          ensureDiseaseExistsForStep(step);
          container.innerHTML = renderDetailView(step);
          updateActionBtn(step === 5 ? '결과 확인하기' : '다음 질문으로', false);
        }
      } else {
        progressBar.style.width = `100%`;
        headerTitle.innerText = `작성 완료`;
        container.innerHTML = renderSummaryView();
        updateActionBtn('📸 이미지로 공유하기', false, true);
      }
    }

    /* 기존 renderIntroView, renderIllnessGrid, renderQuestionView, handleAnswer, ensureDiseaseExistsForStep, addDiseaseToStep, switchTab, removeDisease, renderDetailView, updateD, toggleCritical, handleNameInput, goBack, goNext, validateAndNext 함수들은 그대로 유지 (코드 길이 때문에 생략했으나 실제 파일에는 모두 포함) */

    function renderSummaryView() {
      let html = `
        <div id="summary-card" class="bg-white p-8 rounded-[2rem] card-shadow border border-white/50 text-center relative overflow-hidden">
          <div class="absolute top-0 right-0 w-40 h-40 bg-gradient-to-br from-green-100 to-emerald-50 rounded-full blur-3xl -mr-16 -mt-16 opacity-70"></div>
          <div class="relative z-10">
            <div class="w-20 h-20 bg-gradient-to-br from-green-400 to-emerald-500 text-white rounded-full flex items-center justify-center text-[36px] mx-auto mb-6 shadow-xl shadow-green-500/30 ring-8 ring-green-50 border-4 border-white transform scale-110">🎉</div>
            <h2 class="text-[24px] font-extrabold text-slate-800 mb-3 tracking-tight">작성이 완료되었습니다!</h2>
            <p class="text-[15.5px] text-slate-500 mb-8 font-medium">아래 버튼을 누르면<br><strong>깔끔한 이미지</strong>로 공유됩니다</p>
            
            <div class="bg-slate-50/80 backdrop-blur-sm rounded-[1.5rem] p-6 text-left border border-slate-100 shadow-inner">
              <h3 class="font-extrabold text-slate-700 mb-4 border-b border-slate-200/60 pb-3 text-[15px] flex items-center justify-between">
                <span>체크 결과 요약</span>
                <span class="text-[12px] bg-slate-200 text-slate-500 px-2 py-0.5 rounded-md font-bold">전송 대기 중</span>
              </h3>
              <ul class="space-y-3 text-[14.5px] font-medium">`;

      for (let i = 0; i < 6; i++) {
        const isYes = answers[i] === 'yes';
        html += `<li class="flex items-center justify-between p-2 rounded-lg ${isYes ? 'bg-indigo-50/50' : 'hover:bg-slate-100'} transition-colors"><span class="text-slate-600 flex items-center gap-2"><span class="w-6 h-6 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center text-[11px] font-extrabold">Q${i + 1}</span></span> <span class="font-extrabold ${isYes ? 'text-indigo-600' : 'text-slate-400'}">${isYes ? '예 (있음)' : '아니오'}</span></li>`;
      }

      const totalDiseases = diseases.filter(d => d.name || d.startDate).length;
      html += `</ul>
              <div class="mt-5 pt-4 border-t border-slate-200/60 flex justify-between items-center font-extrabold text-[15.5px]">
                <span class="text-slate-800">작성한 상세 병력</span>
                <span class="${totalDiseases > 0 ? 'text-indigo-600 bg-indigo-100 ring-2 ring-indigo-50' : 'text-slate-500 bg-slate-200'} px-3 py-1 rounded-xl shadow-sm">${totalDiseases}건</span>
              </div>
            </div>
          </div>
        </div>`;
      return html;
    }

    function updateActionBtn(text, disabled, isShare = false) {
      const bContainer = document.getElementById('action-btn-container');
      if (isShare) {
        bContainer.innerHTML = `
          <button onclick="shareAsImage()" 
                  class="w-full h-[64px] rounded-2xl font-extrabold text-[18px] 
                         bg-gradient-to-r from-[#4f46e5] to-[#7c3aed] text-white 
                         shadow-[0_8px_25px_rgba(79,70,229,0.4)] 
                         active:scale-95 transition-all flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16V4a2 2 0 01-2-2H6a2 2 0 01-2 2v12a2 2 0 01-2 2z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span id="action-text">📸 이미지로 공유하기</span>
          </button>
          <p class="text-center text-[13px] font-bold text-slate-500 mt-3">하나린보험🌸 표시 없이 깔끔한 이미지로 공유됩니다</p>
        `;
      } else {
        /* 기존 intro / disabled / normal 버튼 로직 그대로 */
        if (view === 'intro') {
          bContainer.innerHTML = `<button onclick="handleActionClick()" class="w-full h-[64px] rounded-2xl font-extrabold text-[18px] bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-[0_8px_25px_rgba(79,70,229,0.4)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 animate-gentle-pulse"><span id="action-text">${text}</span></button>`;
        } else if (disabled) {
          bContainer.innerHTML = `<button disabled class="w-full h-[64px] rounded-2xl font-extrabold text-[18px] bg-slate-100 text-slate-400 border border-slate-200 cursor-not-allowed transition-all flex items-center justify-center gap-2"><span id="action-text">${text}</span></button>`;
        } else {
          bContainer.innerHTML = `<button onclick="handleActionClick()" class="w-full h-[64px] rounded-2xl font-extrabold text-[18px] bg-slate-800 text-white shadow-xl shadow-slate-800/20 active:scale-95 transition-all flex items-center justify-center gap-2 hover:bg-slate-700"><span id="action-text">${text}</span></button>`;
        }
      }
    }

    /* ==================== 이미지 공유 핵심 함수 (하나린보험🌸 완전 제거) ==================== */
    async function shareAsImage() {
      const card = document.getElementById('summary-card');
      if (!card) return showToast("이미지 생성에 실패했습니다.", true);

      try {
        const canvas = await html2canvas(card, {
          scale: 3,                    // 고해상도
          useCORS: true,
          backgroundColor: '#ffffff',
          logging: false,
          width: card.offsetWidth,
          height: card.offsetHeight
        });

        canvas.toBlob(async (blob) => {
          if (!blob) return;

          const file = new File([blob], `계약전알릴의무_리포트_${new Date().getTime()}.png`, { type: 'image/png' });

          // 모바일 네이티브 공유 시트 (이미지 파일)
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
              files: [file],
              title: '📋 계약 전 알릴 의무 리포트'
            });
            showToast("✅ 이미지 공유 완료!", false);
          } else {
            // 공유 API 미지원 시 다운로드
            const link = document.createElement('a');
            link.download = file.name;
            link.href = URL.createObjectURL(blob);
            link.click();
            showToast("📥 이미지가 다운로드되었습니다.\n갤러리에서 공유해주세요.", false);
          }
        }, 'image/png', 1.0);
      } catch (err) {
        console.error(err);
        showToast("이미지 생성 중 오류가 발생했습니다.\n텍스트 공유로 전환합니다.", true);
        executeShare(); // 기존 텍스트 공유로 fallback
      }
    }

    /* 기존 executeShare (텍스트 공유) 함수도 그대로 유지 */
    function executeShare() {
      const text = generateReportText();
      syncCopy(text);
      if (navigator.share) {
        navigator.share({ title: '📋 계약 전 알릴 의무 리포트', text: text })
          .catch(() => {});
      } else {
        const isKakao = /KAKAOTALK/i.test(navigator.userAgent);
        if (isKakao) {
          alert("✅ 내용이 복사되었습니다.\n카톡으로 돌아가 붙여넣기 해주세요!");
          window.location.href = 'kakaotalk://inappbrowser/close';
        } else {
          showToast("✅ 복사 완료! 붙여넣기 해주세요.", false);
        }
      }
    }

    function syncCopy(text) { /* 기존 syncCopy 그대로 */ 
      const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.top = "0"; ta.style.left = "0"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.focus(); ta.select(); try { document.execCommand('copy'); } catch (err) {} document.body.removeChild(ta);
    }

    function generateReportText() { /* 기존 generateReportText 그대로 */ 
      let r = `📋 [계약 전 알릴 의무 리포트]\n작성일시: ${new Date().toLocaleString()}\n\n■ 기본 응답\n`;
      for (let i = 0; i < 6; i++) r += `[Q${i + 1}] ${answers[i] === 'yes' ? '🔴 예' : '🟢 아니오'}\n`;
      const filledDiseases = diseases.filter(d => d.name || d.startDate);
      if (filledDiseases.length === 0) r += "\n✨ 이상 없음!\n";
      else {
        r += "\n■ 상세 내용\n";
        filledDiseases.forEach((d, i) => {
          const typeEmoji = d.type === 'disease' ? '🦠 질병' : '🩸 상해';
          r += `\n< 건수 ${i + 1} (${typeEmoji}) >\n`;
          if (d.type === 'disease') r += `1. 질병명: ${d.name}${d.criticalIllnesses.length ? ` (11대: ${d.criticalIllnesses.join(',')})` : ''}\n`;
          else r += `1. 사고내용: ${d.name}\n2. 다친부위: ${d.bodyPart}\n`;
          r += `${d.type === 'disease' ? '2' : '3'}. 내원기간: ${d.startDate}~${d.endDate}\n`;
          r += `${d.type === 'disease' ? '3' : '4'}. 진료: 통원 ${d.outPatientDays || 0}일/약 ${d.medicineDays || 0}일/입원 ${d.hospitalDays || 0}일\n`;
          r += `${d.type === 'disease' ? '4' : '5'}. 여부: 입원(${d.isHospitalized ? 'O' : 'X'})/수술(${d.isSurgery ? 'O' : 'X'})\n`;
          const tIdx = d.type === 'disease' ? '5' : '6';
          r += `${tIdx}. 치료: ${d.treatment || '없음'}\n`;
        });
      }
      r += "\n========================\n위와 같이 고지사항 작성을 완료했습니다.\n확인 부탁드립니다! 😊\n";
      return r;
    }

    function showToast(m, isE) { /* 기존 showToast 그대로 */ 
      const t = document.getElementById('toast'), c = document.getElementById('toast-content');
      t.classList.remove('hidden'); t.classList.add('toast-enter');
      c.className = `flex flex-col gap-1.5 px-5 py-4 rounded-2xl shadow-xl text-[14.5px] font-bold text-white bg-slate-800 border-l-4 ${isE ? 'border-red-500' : 'border-green-400'} text-center leading-relaxed z-[999]`;
      c.innerHTML = `<span>${m}</span>`;
      setTimeout(() => { t.classList.remove('toast-enter'); t.classList.add('hidden'); }, 3500);
    }

    function init() { /* 기존 init 그대로 */ 
      loadData();
      render(false);
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
